---
layout: default
---

<article class="post">
  <header>
    <h1>{{ page.title }}</h1>
    <p class="post-meta">
      Posted on {{ page.date | date: "%B %d, %Y" }}
    </p>
  </header>

  <div class="post-content">
    {{ content }}
  </div>

  <footer>
    <p>Written by: {{ site.author }}</p>
  </footer>
</article>
